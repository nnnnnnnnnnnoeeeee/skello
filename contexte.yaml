### Éléments explicatifs sur les données

Fonctionnement d’intercom

Lorsqu’un client fait une demande d’échange depuis l’application, une conversation est créée.

Chaque conversation a un assignee (la personne à qui la conversation est assignée), que l’on peut retrouver via le `assignee_id`.

4 personnes composent la team Support (en plus de Lorette) :

- Héloise (ID 5217337)
- Justine (ID 5391224)
- Patrick (ID 5440474)
- Raphael (ID 5300290)

Les autres assignees ne font pas partie de la team Support.

Chaque conversation a des éléments constitutifs qui représentent les actions qui sont faites sur cette conversation (envoi d’un message, assignation à une personne de l’équipe, fermeture de la conversation...) : ce sont les `conversation_parts`.

Lorsqu’on parle de volume de messages, on ne parle que de `conversation_parts` de type "Messages" :

- les messages des users sont les messages envoyés par les clients.
- les messages des admins ou des bots sont les messages envoyés par Skello.

On choisit de ne pas prendre en compte les messages envoyés par des bots dans l’analyse.

Pour plus d’informations : https://www.intercom.com/drlp/ai-customer-service?utm_source=google&utm_medium=sem&utm_campaign=16438355659&utm_term=intercom&utm_ad_collection=135354092873&utm_ad=726268697185&utm_geo=1006094&gad_source=1&gad_campaignid=16438355659&gbraid=0AAAAAoKeDyJZ53j0dveKC6M8qou_tZThZ&gclid=Cj0KCQjwv-LOBhCdARIsAM5hdKf2pVYIRy0gQ9f46XJF4poDSVhXyCBKW9YL-_ginunKSpPV4ekzbg8aArfXEALw_wcB

