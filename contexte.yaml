# Contexte

Chez Skello, nous utilisons un outil de communication externe qui s’appelle [**Intercom**](https://www.intercom.com/) pour échanger avec nos clients. 

Dès qu’un(e) client a une question ou souhaite échanger avec nous, il/elle peut ouvrir une pop-up depuis son navigateur pour démarrer une conversation écrite.

On récupère les données de cet outil dans notre datawarehouse dans Snowflake afin de pouvoir fournir des analyses et des reportings aux équipes opérationnelles.

Ces données sont notamment intéressantes pour l’équipe Support, qui est dirigée par Lorette : elle est responsable de la qualité de service fournie dès qu’une conversation est ouverte.

Lorette anime chaque lundi matin un meeting avec son équipe, où elle évalue la performance de la semaine passée et les priorités de la semaine à venir. Elle n’a pour le moment pas de visibilité claire sur ces métriques et exprime le besoin de pouvoir s’appuyer sur un reporting bien construit.

**Quelques unes des métriques qu’elle voudrait suivre sont entre autres** : la [CSAT](https://www.qualtrics.com/fr/gestion-de-l-experience/client/csat/?rid=langMatch&prevsite=en&newsite=fr&geo=&geomatch=), le pourcentage des conversations dont la première réponse est donnée en moins de 5mn, les moments dans la semaine où son équipe est le plus sollicitée, un détail par personne de son équipe...

---

### **Objectifs**

A partir du set de données fournies :

1. **Propose un modèle de données** (=ensemble de tables) qui serviront de base au reporting à destination de Lorette à partir des bases de données fournies (`CONVERSATIONS` et `CONVERSATION_PARTS`)
2. **Propose un dashboard ou une structure de reporting** (=template de dashboard) qui pourrait selon toi convenir à Lorette pour qu’elle puisse présenter son meeting hebdomadaire en justifiant tes choix. 

> N’hésite pas à indiquer les questions que tu aurais voulu poser à Lorette, ainsi que les choix que tu fais en fonction des informations partielles que tu as à disposition.
> 

---

### Rendu

- Il est demandé de construire le modèle de données avec des tables en base de données, dont les requêtes SQL seront à fournir.
- L’utilisation d’un repo git pour la restitution du modèle de données est encouragée mais pas obligatoire.
- La forme retenue pour le rendu reste tout à fait libre, choisis l’outil avec lequel tu es le plus à l’aise !

---

### **Critères d’évaluation**

- La rigueur de rédaction du code SQL de construction du modèle de données.
- La rigueur de la démarche, notamment en ce qui concerne la construction du modèle de données.
- Le sens et la compréhension des enjeux business.
- La capacité à présenter clairement et de manière synthétique un dashboard actionable qui répond à une problématique.
- La prise d’initiative dans la démarche.

